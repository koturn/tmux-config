set-option -g default-shell /usr/bin/zsh
# set-environment -g CHERE_INVOKING 1

set-option -g default-terminal 'xterm-256color'
set-option -ga terminal-overrides ",xterm*:Tc:smcup@:rmcup@"
# set -as terminal-features ',rxvt-unicode-256color:clipboard'
set-option -s set-clipboard on
set-option -g allow-passthrough on
set-option -g pane-border-line simple

set-option -sg escape-time 0
set-option -g renumber-windows on

set-option -g mouse on
set-option -g history-limit 10000

set-option -g status-interval 60
set-option -g visual-activity on
set-window-option -g monitor-activity on

# scroll settings
set-window-option -g mode-keys vi
bind / list-keys -T copy-mode-vi
bind-key -T copy-mode-vi Y send-key -X copy-line
# bind-key -T copy-mode-vi Enter send-key -X copy-pipe-and-cancel "cat > /dev/clipboard"
# bind-key -T copy-mode-vi Enter send-key -X copy-pipe-and-cancel "cat | xclip -selection clipboard"

