# bind-key -T copy-mode-vi C-k select-pane -U
# bind-key -T copy-mode-vi C-l select-pane -R
# bind-key -T copy-mode-vi C-\ select-pane -l

# Splitted window start in current directory
unbind %
bind % split-window -h -c "#{pane_current_path}"

unbind '"'
bind '"' split-window -v -c "#{pane_current_path}"

unbind c
bind c new-window -c "#{pane_current_path}"

### COLOR (Solarized dark like)
set-window-option -g clock-mode-color colour64

set-option -g message-style bg=colour235,fg=yellow

set-option -g status-style fg=colour136,bg=colour235,default
set-option -g status-left-length 80
set-option -g status-left "#[fg=colour255,bg=colour234]#S #[fg=colour111][#{window_width}x#{window_height}]  "
set-option -g status-right-length 100
set-option -g status-right "#[fg=colour219]memory:#(memusage) #[fg=brightcyan]#(whoami)@#H #[fg=green]%F %T"

set-window-option -g window-status-format " #I:#W#F[#{window_panes}]"
set-window-option -g window-status-current-format " #I:#W[#{window_panes}]#F"
set-window-option -g window-status-style fg=colour255,bg=default,dim
set-window-option -g window-status-current-style fg=colour154,bg=default,bright
set-window-option -g window-style fg=colour250,bg=black
set-window-option -g window-active-style fg=colour252,bg=colour232
# set-window-option -g window-status-activity-style reverse

set-option -g pane-border-status top
set-option -g pane-border-format "#[fg=yellow]#P #[fg=colour111][#{pane_width}x#{pane_height}] #[fg=brightgreen]#{pane_current_command} #[fg=colour147]#T"
set-option -g pane-border-style fg=colour240
set-option -g pane-active-border-style fg=colour154
set-option -g pane-border-indicators colour

set-option -g display-panes-color colour33
set-option -g display-panes-active-color colour154
